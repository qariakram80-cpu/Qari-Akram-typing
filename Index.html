<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qari Akram Voice Typing</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Nastaliq Urdu', serif; background-color: #f0f2f5; direction: rtl; margin: 0; padding: 10px; text-align: center; }
        .header { background: #075e54; color: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        #output { width: 100%; height: 60vh; background: white; border-radius: 15px; padding: 15px; font-size: 22px; line-height: 2; border: 2px solid #075e54; overflow-y: auto; box-sizing: border-box; margin-bottom: 15px; text-align: right; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; color: white; font-family: 'Noto Nastaliq Urdu', serif; }
        .start { background: #25d366; } .stop { background: #e91e63; }
        .copy { background: #34b7f1; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="header"><h1>قاری اکرم وائس ٹائپنگ</h1></div>
    <div id="output" contenteditable="true">شروع کرنے کے لیے بٹن دبائیں...</div>
    <div class="btns">
        <button class="start" onclick="startRec()">شروع کریں</button>
        <button class="stop" onclick="stopRec()">روک دیں</button>
        <button class="copy" onclick="copyTxt()">تحریر کاپی کریں</button>
    </div>
    <p id="status" style="margin-top:10px;">اسٹیٹس: تیار ہے</p>

    <script>
        var recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ur-PK'; recognition.continuous = true; recognition.interimResults = true;
        var final_txt = ''; var isRecording = false;

        recognition.onresult = function(event) {
            var interim = '';
            for (var i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) { final_txt += event.results[i][0].transcript + ' '; }
                else { interim += event.results[i][0].transcript; }
            }
            document.getElementById('output').innerHTML = final_txt + '<span style="color:#999">' + interim + '</span>';
        };

        recognition.onend = function() { if(isRecording) recognition.start(); };

        function startRec() { isRecording = true; recognition.start(); document.getElementById('status').innerHTML = "ریکارڈنگ ہو رہی ہے..."; }
        function stopRec() { isRecording = false; recognition.stop(); document.getElementById('status').innerHTML = "رک گئی ہے"; }
        function copyTxt() { navigator.clipboard.writeText(document.getElementById('output').innerText); alert("کاپی ہو گیا!"); }
    </script>
</body>
</html>
